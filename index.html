<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3분 영단어 레벨 진단평가</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        
        h1 { color: #2d3748; margin-bottom: 10px; }
        p.desc { color: #718096; margin-bottom: 30px; line-height: 1.5; font-size: 0.95rem; }
        
        .hidden { display: none !important; }
        
        /* Game Screen */
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 600; color: #4a5568; }
        .timer { color: #e53e3e; font-size: 1.2rem; }
        .difficulty-badge { background: #ebf4ff; color: #3182ce; padding: 5px 10px; border-radius: 10px; font-size: 0.9rem; }
        .difficulty-hard { background: #fff5f5; color: #e53e3e; }
        
        .question-box { background: #edf2f7; padding: 40px 20px; border-radius: 15px; margin-bottom: 20px; }
        .question { font-size: 2rem; font-weight: 700; color: #1a202c; margin: 0; }
        .hint { font-size: 0.9rem; color: #718096; margin-top: 10px; }
        
        input[type="text"] { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #cbd5e0; border-radius: 10px; margin-bottom: 15px; outline: none; text-align: center; transition: 0.2s; }
        input[type="text"]:focus { border-color: #4299e1; }
        
        button { background: #4299e1; color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%; }
        button:hover { background: #3182ce; }
        
        .feedback { min-height: 24px; font-weight: 600; margin-bottom: 15px; }
        .correct { color: #38a169; }
        .wrong { color: #e53e3e; }

        /* Result Screen & Characters */
        .level-result { font-size: 3rem; font-weight: 700; color: #4299e1; margin: 10px 0 20px 0; }
        
        .character-container {
            font-size: 6rem;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #fffaf0 0%, #ffe4e6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            box-shadow: 0 15px 25px rgba(255, 182, 193, 0.4);
            animation: float 3s ease-in-out infinite;
            border: 4px solid #fff;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .character-name {
            background: #fff0f5;
            color: #d53f8c;
            padding: 8px 20px;
            border-radius: 25px;
            display: inline-block;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .stats-box { background: #f7fafc; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; }
        .mistake-list { text-align: left; max-height: 150px; overflow-y: auto; background: #fff5f5; padding: 15px; border-radius: 10px; font-size: 0.9rem; margin-top: 15px;}
    </style>
</head>
<body>

    <!-- 시작 화면 -->
    <div id="start-screen" class="container">
        <h1>3분 어휘력 진단평가</h1>
        <p class="desc">제시된 단어의 뜻(한국어)이나 스펠링(영어)을 입력하세요.<br><strong>비슷한 뜻을 적어도 모두 똑똑하게 정답 처리됩니다!</strong><br><br>정답을 맞히면 난이도가 올라가고 틀리면 내려갑니다.<br>시간은 딱 3분! 당신의 레벨을 확인해보세요.</p>
        <button onclick="startGame()">진단 시작하기</button>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen" class="container hidden">
        <div class="header">
            <div id="difficulty-indicator" class="difficulty-badge">난이도: 쉬움 (뜻 적기)</div>
            <div class="timer" id="timer">03:00</div>
        </div>
        <div class="question-box">
            <p id="question" class="question">Word</p>
            <p id="hint" class="hint"></p>
        </div>
        <div id="feedback" class="feedback"></div>
        <input type="text" id="answer-input" placeholder="정답을 입력하세요" autocomplete="off">
        <button onclick="submitAnswer()">제출 (Enter)</button>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="container hidden">
        <h1>진단 결과</h1>
        
        <!-- 귀여운 동물 캐릭터 영역 -->
        <div class="character-container" id="character-emoji">🐹</div>
        <div class="character-name" id="character-name">애기 햄스터</div>

        <div id="level-display" class="level-result">LV. 1</div>
        <p id="level-desc" class="desc" style="font-weight: 600; color: #2d3748;"></p>
        
        <div class="stats-box" id="stats-display">
            <!-- 통계 텍스트 -->
        </div>

        <h3 style="margin-bottom: 5px; font-size: 1rem;">틀린 단어 복습</h3>
        <div id="mistake-list" class="mistake-list"></div>

        <button style="margin-top: 20px;" onclick="location.reload()">다시 도전하여 진화하기!</button>
    </div>

    <script>
        const wordData =[
            { en: "evolutionary", ko: "진화의, 진화론적인", roots:["진화"] },
            { en: "biologist", ko: "생물학자", roots:["생물학"] },
            { en: "locate", ko: "위치시키다, 위치하다, 위치를 찾다", roots:["위치", "알아내", "발견", "찾다", "찾기", "찾음", "찾아"] },
            { en: "fascinating", ko: "매혹적인, 대단히 흥미로운", roots:["매혹", "흥미", "매력", "멋진", "재미"] },
            { en: "companion", ko: "친구, 동반자", roots:["친구", "동반", "동행", "반려", "동료"] },
            { en: "responsive", ko: "반응하는", roots:["반응", "민감", "호응", "대답"] },
            { en: "behavior", ko: "행동", roots:["행동", "품행", "태도", "행위"] },
            { en: "anthropologist", ko: "인류학자", roots: ["인류학"] },
            { en: "conduct", ko: "행동하다, 활동을 하다", roots:["행동", "활동", "수행", "지휘", "실시", "진행"] },
            { en: "ancestor", ko: "조상", roots:["조상", "선조", "선대"] },
            { en: "at random", ko: "무작위로", roots:["무작위", "임의", "맘대로", "마음대로", "랜덤", "마구잡이"] },
            { en: "conclude", ko: "결론을 내다", roots:["결론", "끝내", "마치", "끝마"] },
            { en: "species", ko: "종(種)", roots:["종류", "종"] },
            { en: "evolve", ko: "발달하다, 진화하다", roots:["발달", "진화", "발전"] },
            { en: "colleague", ko: "동료", roots: ["동료", "동업", "친구"] },
            { en: "genetically", ko: "유전적으로", roots: ["유전"] },
            { en: "cooperative", ko: "협력적인", roots:["협력", "협동", "협조"] },
            { en: "device", ko: "장치", roots:["장치", "기구", "도구", "기기", "설비"] },
            { en: "occasionally", ko: "가끔", roots:["가끔", "때때", "종종", "이따금"] },
            { en: "get along", ko: "잘 지내다", roots:["잘지내", "어울리", "사이", "친하"] },
            { en: "extinction", ko: "멸종", roots:["멸종", "소멸"] },
            { en: "attention", ko: "관심, 주의", roots:["관심", "주의", "집중", "주목"] },
            { en: "superior", ko: "우월한", roots:["우월", "뛰어난", "우수", "상급", "나은", "월등"] },
            { en: "attribute", ko: "속성, 자질", roots:["속성", "자질", "특징", "특성", "기인", "탓"] },
            { en: "ultimately", ko: "결국, 궁극적으로", roots:["결국", "궁극", "마침내", "최후", "최종", "결론"] },
            { en: "thrive", ko: "번창하다, 잘 자라다", roots:["번창", "번성", "잘자라", "번영", "성공", "무성"] },
            { en: "competitive", ko: "경쟁적인, 경쟁력 있는", roots: ["경쟁"] },
            { en: "propose", ko: "제안하다", roots:["제안", "청혼", "제시", "제의"] },
            { en: "alternative", ko: "대안, 대체의", roots:["대체", "대안", "대신"] },
            { en: "comforting", ko: "위안이 되는", roots:["위안", "위로", "편안"] },
            { en: "bouquet", ko: "꽃다발", roots:["꽃다발", "부케"] },
            { en: "harmonize", ko: "조화를 이루다, 어울리다", roots:["조화", "어울리", "화합", "맞추"] },
            { en: "contribute", ko: "기여하다, 도움이 되다", roots:["기여", "도움", "공헌", "이바지", "기부"] },
            { en: "flourish", ko: "성공하다, 번창하다, 번성하다", roots:["번창", "번성", "잘자라", "성공", "융성", "번영"] },
            { en: "sentiment", ko: "의견, 정서", roots:["의견", "정서", "감정", "생각", "기분", "정취"] },
            { en: "spring up", ko: "생겨나다", roots:["생겨", "생기", "솟아", "나타", "발생", "튀어"] },
            { en: "approximately", ko: "거의, 대략", roots:["거의", "대략", "대충", "대부분", "얼추", "약"] },
            { en: "consume", ko: "소비하다, 먹다", roots:["소비", "섭취", "마시", "먹다", "먹어", "먹음", "쓰다", "사용"] },
            { en: "necessity", ko: "필수품", roots:["필수", "필요", "불가피"] },
            { en: "widespread", ko: "광범위한, 널리 퍼진", roots:["광범위", "널리", "만연", "폭넓", "퍼진"] },
            { en: "come at a cost", ko: "대가가 따르다", roots:["대가", "희생", "비용"] },
            { en: "substantial", ko: "상당한", roots:["상당", "실질", "엄청", "막대", "크다", "큰", "많다", "많은"] },
            { en: "extraction", ko: "추출", roots:["추출", "뽑아", "채굴", "뽑기", "뽑는"] },
            { en: "generate", ko: "생성하다, 발생시키다", roots:["생성", "발생", "만들", "일으키"] },
            { en: "significant", ko: "상당한, 커다란", roots:["상당", "커다", "중요", "의미", "중대", "크다", "큰"] },
            { en: "remaining", ko: "남아 있는", roots:["남아", "남은", "잔여"] },
            { en: "dispose of", ko: "처리하다", roots:["처리", "버리", "처분", "없애"] },
            { en: "vast", ko: "어마어마한, 방대한", roots:["어마어마", "방대", "거대", "엄청", "광대", "막대", "크다", "큰", "넓다", "넓은"] },
            { en: "quantity", ko: "양", roots:["수량", "분량", "크기", "양"] },
            { en: "landfill", ko: "쓰레기 매립지", roots:["매립", "쓰레기장"] },
            { en: "release", ko: "방출하다, 풀어 주다", roots:["방출", "풀어", "놓아", "석방", "발표", "출시", "해방", "배출"] },
            { en: "potent", ko: "강력한, 유력한", roots:["강력", "유력", "힘센", "강한", "효능"] },
            { en: "incinerate", ko: "소각하다", roots:["소각", "태우", "불태"] },
            { en: "take into account", ko: "고려하다", roots:["고려", "참작", "생각", "감안", "계산"] },
            { en: "compound", ko: "화합물, 복합체", roots:["화합", "복합", "혼합", "합성"] },
            { en: "measure", ko: "대책, 조치", roots:["대책", "조치", "측정", "수단", "방법", "재다", "재기"] },
            { en: "in action", ko: "활동하는, 작동하는", roots:["활동", "작동", "움직이", "실행"] },
            { en: "collaborate", ko: "협력하다", roots:["협력", "협동", "공동", "함께", "협업"] },
            { en: "process", ko: "처리하다, 가공하다", roots:["처리", "가공", "과정", "공정", "절차"] },
            { en: "impurity", ko: "불순물", roots:["불순", "찌꺼기", "더러움"] },
            { en: "fertilizer", ko: "비료", roots:["비료", "거름", "퇴비"] },
            { en: "transform", ko: "변형시키다, 바꾸다", roots:["변형", "바꾸", "변환", "탈바꿈", "개조", "바뀜"] },
            { en: "produce", ko: "농작물, 농산물", roots:["농작", "농산", "생산", "만들"] },
            { en: "repurpose", ko: "다른 목적에 맞게 만들다", roots:["목적", "용도", "재사용", "개조", "재활용"] },
            { en: "in this manner", ko: "이런 식으로", roots:["이런식", "이와같이", "이런방법", "이렇게"] },
            { en: "a wide range of", ko: "다양한", roots:["다양", "광범위", "폭넓", "여러", "넓은"] },
            { en: "log", ko: "통나무, 장작", roots:["통나무", "장작", "일지", "기록"] },
            { en: "fabric", ko: "섬유, 직물, 천", roots:["섬유", "직물", "옷감", "구조", "천"] },
            { en: "absorb", ko: "흡수하다", roots:["흡수", "빨아", "받아"] },
            { en: "appealing", ko: "매력적인, 흥미로운", roots:["매력", "흥미", "호소", "끌리"] },
            { en: "appearance", ko: "외관", roots:["외관", "겉모습", "출현", "나타", "외모", "생김새"] },
            { en: "preserve", ko: "보존하다", roots:["보존", "보호", "유지", "지키"] },
            { en: "take steps", ko: "조치를 취하다", roots:["조치", "절차", "단계", "행동"] },
            { en: "sustainable", ko: "지속 가능한", roots:["지속", "유지", "견딜"] },
            { en: "dedicate", ko: "헌신하다, 바치다", roots:["헌신", "전념", "바치", "쏟다"] },
            { en: "encourage", ko: "격려하다", roots:["격려", "장려", "용기", "촉구", "응원", "권장"] }
        ];

        let words =[];
        let timeLeft = 180;
        let timerInterval;
        let currentWord = null;
        let isKo2En = false; 
        let consecutiveCorrect = 0;
        let stats = { easyTotal: 0, easyCorrect: 0, hardTotal: 0, hardCorrect: 0, mistakes:[] };

        const inputEl = document.getElementById('answer-input');

        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') submitAnswer();
        });

        function startGame() {
            words =[...wordData].sort(() => Math.random() - 0.5); 
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            startTimer();
            nextQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function nextQuestion() {
            if (words.length === 0) return endGame();
            
            if (consecutiveCorrect >= 2) isKo2En = true; 
            else if (consecutiveCorrect === 0) isKo2En = false; 

            currentWord = words.pop();
            const badge = document.getElementById('difficulty-indicator');
            
            if (isKo2En) {
                document.getElementById('question').innerText = currentWord.ko;
                document.getElementById('hint').innerText = "(영어로 입력하세요)";
                badge.innerText = "난이도: 어려움 (영어 스펠링)";
                badge.classList.add('difficulty-hard');
                stats.hardTotal++;
            } else {
                document.getElementById('question').innerText = currentWord.en;
                document.getElementById('hint').innerText = "(한국어 뜻을 입력하세요)";
                badge.innerText = "난이도: 쉬움 (한국어 뜻)";
                badge.classList.remove('difficulty-hard');
                stats.easyTotal++;
            }
            inputEl.value = "";
            inputEl.focus();
        }

        function checkKoreanAnswer(input, wordObj) {
            const inputClean = input.replace(/\s+/g, '');
            const roots = wordObj.roots;

            return roots.some(root => {
                if (root.length === 1) {
                    return inputClean === root || 
                           inputClean === root + "이다" || 
                           inputClean === root + "로";
                } else {
                    return inputClean.includes(root);
                }
            });
        }

        function submitAnswer() {
            if(!currentWord) return;
            const answer = inputEl.value.trim().toLowerCase();
            if(answer === "") return;

            let isCorrect = false;

            if (isKo2En) {
                isCorrect = (answer === currentWord.en.toLowerCase());
            } else {
                isCorrect = checkKoreanAnswer(answer, currentWord);
            }

            const feedbackEl = document.getElementById('feedback');
            
            if (isCorrect) {
                feedbackEl.innerText = "✅ 정답입니다!";
                feedbackEl.className = "feedback correct";
                consecutiveCorrect++;
                if(isKo2En) stats.hardCorrect++;
                else stats.easyCorrect++;
            } else {
                const correctStr = isKo2En ? currentWord.en : currentWord.ko;
                feedbackEl.innerText = `❌ 오답! (정답: ${correctStr})`;
                feedbackEl.className = "feedback wrong";
                consecutiveCorrect = 0;
                stats.mistakes.push(`${currentWord.en} : ${currentWord.ko}`);
            }
            setTimeout(nextQuestion, 800); 
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            calculateLevel();
        }

        function calculateLevel() {
            const easyRate = stats.easyTotal > 0 ? (stats.easyCorrect / stats.easyTotal) : 0;
            const hardRate = stats.hardTotal > 0 ? (stats.hardCorrect / stats.hardTotal) : 0;
            
            let level = 1;
            let desc = "";
            let characterEmoji = "🐹";
            let characterName = "애기 햄스터";

            if (stats.hardCorrect >= 5 && hardRate >= 0.7) {
                level = 4;
                characterEmoji = "🦄";
                characterName = "환상의 유니콘";
                desc = "어려운 영작도 거침없이 해내는 어휘력 마스터! 전설 속에 등장하는 똑똑한 유니콘 수준입니다.";
            } else if (stats.hardCorrect >= 2 || (easyRate >= 0.8 && stats.easyTotal > 10)) {
                level = 3;
                characterEmoji = "🐻";
                characterName = "듬직한 곰돌이";
                desc = "대부분의 뜻을 잘 알고 있으며 영어 작문도 제법 능숙한 듬직하고 멋진 곰돌이 수준입니다.";
            } else if (stats.easyCorrect >= 5) {
                level = 2;
                characterEmoji = "🐿️"; /* 쿼카 전용 이모지가 없어 가장 비슷한 다람쥐 활용 */
                characterName = "애기 쿼카";
                desc = "기초적인 뜻은 잘 알고 항상 웃고 있는 긍정왕! 귀여운 애기 쿼카 수준입니다.";
            } else {
                level = 1;
                characterEmoji = "🐹";
                characterName = "애기 햄스터";
                desc = "단어 암기를 이제 막 시작한 뽀시래기 애기 햄스터 수준입니다. 쳇바퀴 돌듯 복습이 필요해요!";
            }

            // 캐릭터 업데이트
            document.getElementById('character-emoji').innerText = characterEmoji;
            document.getElementById('character-name').innerText = characterName;

            document.getElementById('level-display').innerText = `LV. ${level}`;
            document.getElementById('level-desc').innerText = desc;

            document.getElementById('stats-display').innerHTML = `
                <div>👉 <b>뜻 맞히기(쉬움):</b> ${stats.easyCorrect} / ${stats.easyTotal}</div>
                <div>👉 <b>영어 적기(어려움):</b> ${stats.hardCorrect} / ${stats.hardTotal}</div>
            `;

            const mistakeDiv = document.getElementById('mistake-list');
            if (stats.mistakes.length === 0) {
                mistakeDiv.innerHTML = "틀린 단어가 없습니다! 완벽해요.";
            } else {
                const uniqueMistakes =[...new Set(stats.mistakes)];
                mistakeDiv.innerHTML = uniqueMistakes.map(m => `<div>- ${m}</div>`).join('');
            }
        }
    </script>
</body>
</html>
