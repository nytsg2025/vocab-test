<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3분 영단어 레벨 진단평가</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        
        h1 { color: #2d3748; margin-bottom: 10px; }
        p.desc { color: #718096; margin-bottom: 30px; line-height: 1.5; }
        
        .hidden { display: none !important; }
        
        /* Game Screen */
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 600; color: #4a5568; }
        .timer { color: #e53e3e; font-size: 1.2rem; }
        .difficulty-badge { background: #ebf4ff; color: #3182ce; padding: 5px 10px; border-radius: 10px; font-size: 0.9rem; }
        .difficulty-hard { background: #fff5f5; color: #e53e3e; }
        
        .question-box { background: #edf2f7; padding: 40px 20px; border-radius: 15px; margin-bottom: 20px; }
        .question { font-size: 2rem; font-weight: 700; color: #1a202c; margin: 0; }
        .hint { font-size: 0.9rem; color: #718096; margin-top: 10px; }
        
        input[type="text"] { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #cbd5e0; border-radius: 10px; margin-bottom: 15px; outline: none; text-align: center; transition: 0.2s; }
        input[type="text"]:focus { border-color: #4299e1; }
        
        button { background: #4299e1; color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%; }
        button:hover { background: #3182ce; }
        
        .feedback { min-height: 24px; font-weight: 600; margin-bottom: 15px; }
        .correct { color: #38a169; }
        .wrong { color: #e53e3e; }

        /* Result Screen */
        .level-result { font-size: 3rem; font-weight: 700; color: #4299e1; margin: 20px 0; }
        .stats-box { background: #f7fafc; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; }
        .mistake-list { text-align: left; max-height: 150px; overflow-y: auto; background: #fff5f5; padding: 15px; border-radius: 10px; font-size: 0.9rem; margin-top: 15px;}
    </style>
</head>
<body>

    <!-- 시작 화면 -->
    <div id="start-screen" class="container">
        <h1>3분 어휘력 진단평가</h1>
        <p class="desc">제시된 단어의 뜻(한국어)이나 스펠링(영어)을 입력하세요.<br>정답을 맞히면 난이도가 올라가고 틀리면 내려갑니다.<br>시간은 딱 3분! 당신의 레벨을 확인해보세요.</p>
        <button onclick="startGame()">진단 시작하기</button>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen" class="container hidden">
        <div class="header">
            <div id="difficulty-indicator" class="difficulty-badge">난이도: 쉬움 (뜻 적기)</div>
            <div class="timer" id="timer">03:00</div>
        </div>
        <div class="question-box">
            <p id="question" class="question">Word</p>
            <p id="hint" class="hint"></p>
        </div>
        <div id="feedback" class="feedback"></div>
        <input type="text" id="answer-input" placeholder="정답을 입력하세요" autocomplete="off">
        <button onclick="submitAnswer()">제출 (Enter)</button>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="container hidden">
        <h1>진단 결과</h1>
        <div id="level-display" class="level-result">LV. 1</div>
        <p id="level-desc" class="desc" style="font-weight: 600; color: #2d3748;"></p>
        
        <div class="stats-box" id="stats-display">
            <!-- 통계 텍스트 -->
        </div>

        <h3 style="margin-bottom: 5px; font-size: 1rem;">틀린 단어 복습</h3>
        <div id="mistake-list" class="mistake-list"></div>

        <button style="margin-top: 20px;" onclick="location.reload()">다시 도전하기</button>
    </div>

    <script>
        // 단어 데이터 (제시해주신 단어장)
        const wordData =[
            { en: "evolutionary", ko: "진화의, 진화론적인" },
            { en: "biologist", ko: "생물학자" },
            { en: "locate", ko: "위치를 찾다" },
            { en: "fascinating", ko: "대단히 흥미로운, 매력적인" },
            { en: "companion", ko: "친구, 동반자" },
            { en: "responsive", ko: "반응하는" },
            { en: "behavior", ko: "행동" },
            { en: "anthropologist", ko: "인류학자" },
            { en: "conduct", ko: "행동하다, 활동을 하다" },
            { en: "ancestor", ko: "조상" },
            { en: "at random", ko: "무작위로" },
            { en: "conclude", ko: "결론을 내다" },
            { en: "species", ko: "종" },
            { en: "evolve", ko: "발달하다, 진화하다" },
            { en: "colleague", ko: "동료" },
            { en: "genetically", ko: "유전적으로" },
            { en: "cooperative", ko: "협력적인" },
            { en: "device", ko: "장치" },
            { en: "occasionally", ko: "가끔" },
            { en: "get along", ko: "잘 지내다" },
            { en: "extinction", ko: "멸종" },
            { en: "attention", ko: "관심, 주의" },
            { en: "superior", ko: "우월한" },
            { en: "attribute", ko: "속성, 자질" },
            { en: "ultimately", ko: "결국, 궁극적으로" },
            { en: "thrive", ko: "번창하다, 잘 자라다" },
            { en: "competitive", ko: "경쟁의, 경쟁력 있는" },
            { en: "propose", ko: "제안하다" },
            { en: "alternative", ko: "대체의" },
            { en: "comforting", ko: "위안이 되는" },
            { en: "bouquet", ko: "꽃다발" },
            { en: "harmonize", ko: "조화를 이루다, 어울리다" },
            { en: "contribute", ko: "기여하다, 도움이 되다" },
            { en: "flourish", ko: "번창하다, 번성하다" },
            { en: "sentiment", ko: "의견, 정서" },
            { en: "spring up", ko: "생겨나다" },
            { en: "approximately", ko: "거의, 대략" },
            { en: "consume", ko: "소비하다, 먹다" },
            { en: "necessity", ko: "필수품" },
            { en: "widespread", ko: "광범위한, 널리 퍼진" },
            { en: "come at a cost", ko: "대가가 따르다" },
            { en: "substantial", ko: "상당한" },
            { en: "extraction", ko: "추출" },
            { en: "generate", ko: "발생시키다" },
            { en: "significant", ko: "상당한, 커다란" },
            { en: "remaining", ko: "남아 있는" },
            { en: "dispose of", ko: "처리하다" },
            { en: "vast", ko: "어마어마한, 방대한" },
            { en: "quantity", ko: "양" },
            { en: "landfill", ko: "쓰레기 매립지" },
            { en: "release", ko: "방출하다, 풀어 주다" },
            { en: "potent", ko: "강력한, 유력한" },
            { en: "incinerate", ko: "소각하다" },
            { en: "take into account", ko: "고려하다" },
            { en: "compound", ko: "화합물, 복합체" },
            { en: "measure", ko: "대책, 조치" },
            { en: "in action", ko: "활동하는, 작동하는" },
            { en: "collaborate", ko: "협력하다" },
            { en: "process", ko: "처리하다, 가공하다" },
            { en: "impurity", ko: "불순물" },
            { en: "fertilizer", ko: "비료" },
            { en: "transform", ko: "변형시키다, 바꾸다" },
            { en: "produce", ko: "농작물, 농산물" },
            { en: "repurpose", ko: "다른 목적에 맞게 만들다" },
            { en: "in this manner", ko: "이런 식으로" },
            { en: "a wide range of", ko: "다양한" },
            { en: "log", ko: "통나무, 장작" },
            { en: "fabric", ko: "직물, 천" },
            { en: "absorb", ko: "흡수하다" },
            { en: "appealing", ko: "매력적인, 흥미로운" },
            { en: "appearance", ko: "외관" },
            { en: "preserve", ko: "보존하다" },
            { en: "take steps", ko: "조치를 취하다" },
            { en: "sustainable", ko: "지속 가능한" },
            { en: "dedicate to", ko: "헌신하다, 바치다" },
            { en: "encourage", ko: "격려하다" }
        ];

        let words =[];
        let timeLeft = 180; // 3분
        let timerInterval;
        
        // 상태 관리
        let currentWord = null;
        let isKo2En = false; // false = 쉬움(한글적기), true = 어려움(영어적기)
        let consecutiveCorrect = 0;
        
        // 통계
        let stats = {
            easyTotal: 0, easyCorrect: 0,
            hardTotal: 0, hardCorrect: 0,
            mistakes:[]
        };

        const inputEl = document.getElementById('answer-input');

        // 엔터키 입력 처리
        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') submitAnswer();
        });

        function startGame() {
            words = [...wordData].sort(() => Math.random() - 0.5); // 셔플
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            startTimer();
            nextQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function nextQuestion() {
            if (words.length === 0) return endGame();
            
            // 난이도 조절 알고리즘 (동적 평가)
            if (consecutiveCorrect >= 2) {
                isKo2En = true; // 2연속 정답시 영어 적기로 난이도업
            } else if (consecutiveCorrect === 0) {
                isKo2En = false; // 틀리면 다시 뜻 적기로 난이도다운
            }

            currentWord = words.pop();
            
            const badge = document.getElementById('difficulty-indicator');
            if (isKo2En) {
                document.getElementById('question').innerText = currentWord.ko;
                document.getElementById('hint').innerText = "(영어로 입력하세요)";
                badge.innerText = "난이도: 어려움 (영어 스펠링)";
                badge.classList.add('difficulty-hard');
                stats.hardTotal++;
            } else {
                document.getElementById('question').innerText = currentWord.en;
                document.getElementById('hint').innerText = "(한국어 뜻을 입력하세요)";
                badge.innerText = "난이도: 쉬움 (한국어 뜻)";
                badge.classList.remove('difficulty-hard');
                stats.easyTotal++;
            }
            
            inputEl.value = "";
            inputEl.focus();
        }

        function checkKoreanAnswer(input, correctAnswers) {
            // 한글 정답 검사 (관대하게 처리)
            const inputClean = input.replace(/\s/g, '');
            const answers = correctAnswers.split(',').map(s => s.replace(/ /g, ''));
            // 뜻 중에 유저가 적은 단어가 포함되어 있거나, 유저가 적은 단어에 뜻이 포함되어 있으면 정답
            return answers.some(ans => ans.includes(inputClean) || inputClean.includes(ans));
        }

        function submitAnswer() {
            if(!currentWord) return;
            const answer = inputEl.value.trim().toLowerCase();
            if(answer === "") return;

            let isCorrect = false;

            if (isKo2En) {
                isCorrect = (answer === currentWord.en.toLowerCase());
            } else {
                isCorrect = checkKoreanAnswer(answer, currentWord.ko);
            }

            const feedbackEl = document.getElementById('feedback');
            
            if (isCorrect) {
                feedbackEl.innerText = "✅ 정답입니다!";
                feedbackEl.className = "feedback correct";
                consecutiveCorrect++;
                if(isKo2En) stats.hardCorrect++;
                else stats.easyCorrect++;
            } else {
                const correctStr = isKo2En ? currentWord.en : currentWord.ko;
                feedbackEl.innerText = `❌ 오답! (정답: ${correctStr})`;
                feedbackEl.className = "feedback wrong";
                consecutiveCorrect = 0;
                stats.mistakes.push(`${currentWord.en} : ${currentWord.ko}`);
            }

            setTimeout(nextQuestion, 800); // 0.8초 후 다음 문제
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            calculateLevel();
        }

        function calculateLevel() {
            const easyRate = stats.easyTotal > 0 ? (stats.easyCorrect / stats.easyTotal) : 0;
            const hardRate = stats.hardTotal > 0 ? (stats.hardCorrect / stats.hardTotal) : 0;
            
            let level = 1;
            let desc = "";

            if (stats.hardCorrect >= 5 && hardRate >= 0.7) {
                level = 4;
                desc = "단어의 뜻을 완벽히 숙지하고 있으며, 어려운 영작도 거침없이 해내는 마스터 수준입니다!";
            } else if (stats.hardCorrect >= 2 || (easyRate >= 0.8 && stats.easyTotal > 10)) {
                level = 3;
                desc = "대부분의 한국어 뜻을 잘 알고 있으며, 기초적인 영어 작문도 제법 능숙합니다.";
            } else if (stats.easyCorrect >= 5) {
                level = 2;
                desc = "단어의 기초적인 뜻은 알고 있으나, 아직 정확한 스펠링을 외우거나 응용하기엔 헷갈려 합니다.";
            } else {
                level = 1;
                desc = "단어의 한국어 뜻을 몇 개 알지만 아직 암기가 덜 되어 영어로 적기를 매우 어려워합니다. 집중적인 단어 암기가 필요합니다!";
            }

            document.getElementById('level-display').innerText = `LV. ${level}`;
            document.getElementById('level-desc').innerText = desc;

            document.getElementById('stats-display').innerHTML = `
                <div>👉 <b>뜻 맞히기(쉬움):</b> ${stats.easyCorrect} / ${stats.easyTotal}</div>
                <div>👉 <b>영어 적기(어려움):</b> ${stats.hardCorrect} / ${stats.hardTotal}</div>
            `;

            const mistakeDiv = document.getElementById('mistake-list');
            if (stats.mistakes.length === 0) {
                mistakeDiv.innerHTML = "틀린 단어가 없습니다! 완벽해요.";
            } else {
                // 중복제거 후 출력
                const uniqueMistakes =[...new Set(stats.mistakes)];
                mistakeDiv.innerHTML = uniqueMistakes.map(m => `<div>- ${m}</div>`).join('');
            }
        }
    </script>
</body>
</html>
